<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6673999340244783"
     crossorigin="anonymous"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoulSG — Sacred Geometry from Your Name</title>
<style>
  :root {
    --bg-page: #07061a;
    --bg-card: #100b2e;
    --bg-soft: rgba(255,255,255,0.04);
    --bg-soft-2: rgba(255,255,255,0.08);
    --text-1: #f3f0ff;
    --text-2: rgba(243,240,255,0.62);
    --text-3: rgba(243,240,255,0.38);
    --border-1: rgba(255,255,255,0.10);
    --border-2: rgba(255,255,255,0.20);
    --radius-md: 8px;
    --radius-lg: 16px;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-page);
    color: var(--text-1);
    font-family: var(--font-sans);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .app {
    width: 100%;
    max-width: 520px;
  }
  .header {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .header p {
    margin: 0.25rem 0 0;
    font-size: 12px;
    color: var(--text-3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  input[type="text"] {
    width: 100%;
    height: 44px;
    padding: 0 16px;
    background: var(--bg-soft);
    border: 0.5px solid var(--border-1);
    border-radius: var(--radius-md);
    color: var(--text-1);
    font: inherit;
    font-size: 16px;
    text-align: center;
    letter-spacing: 0.08em;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus {
    border-color: var(--border-2);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
  }
  button {
    background: transparent;
    border: 0.5px solid var(--border-1);
    border-radius: var(--radius-md);
    color: var(--text-1);
    font: inherit;
    font-size: 14px;
    padding: 8px 14px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  button:hover { background: var(--bg-soft); border-color: var(--border-2); }
  button:active { transform: scale(0.98); }
  button.mode { font-size: 13px; padding: 6px 14px; }
  button.mode.active { background: var(--bg-soft-2); border-color: var(--border-2); }
  button#play {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; padding: 10px 22px;
  }
  .panel {
    position: relative;
    border-radius: 24px;
    overflow: hidden;
    background: radial-gradient(ellipse at 50% 40%, #1a1438 0%, #0a0820 60%, #050410 100%);
  }
  .panel svg { display: block; width: 100%; }
  .meta {
    text-align: center;
    font-size: 12px;
    color: var(--text-3);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin: 1rem 0 0.75rem;
    min-height: 16px;
  }
  .row { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }
  .row.center-1 { margin-bottom: 0.75rem; }
  .row.center-2 { margin-bottom: 1rem; align-items: center; gap: 8px; }
  .hp-note {
    text-align: center;
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 0.1em;
    margin-bottom: 0.75rem;
    height: 14px;
  }
  .footer {
    margin-top: 2rem;
    text-align: center;
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 0.1em;
  }
  @media (max-width: 480px) {
    body { padding: 1rem; }
    .header h1 { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <h1>SoulSG</h1>
    <p>your name as sacred geometry</p>
  </div>

  <div style="margin: 0 0 1.25rem;">
    <input id="nm" type="text" value="Aurelia" maxlength="20" placeholder="Enter a name" />
  </div>

  <div class="panel">
    <svg id="sg" viewBox="0 0 600 600" role="img">
      <title>Luminous sacred geometry sigil</title>
      <desc>Generated mandala from the input name.</desc>
    </svg>
  </div>

  <div id="meta" class="meta">&nbsp;</div>

  <div class="row center-1">
    <button class="mode active" data-mode="drone">Drone</button>
    <button class="mode" data-mode="binaural">Binaural</button>
  </div>

  <div id="hpNote" class="hp-note"></div>

  <div class="row center-2">
    <button id="play">
      <svg width="12" height="12" viewBox="0 0 12 12" id="pIcon"><polygon points="2,1 11,6 2,11" fill="currentColor"/></svg>
      <span id="pLabel">Play</span>
    </button>
    <button id="dl">Download SVG</button>
  </div>

  <div class="row">
    <button onclick="setName('Sophia')">Sophia</button>
    <button onclick="setName('Marcus')">Marcus</button>
    <button onclick="setName('Yuki')">Yuki</button>
    <button onclick="setName('Kwame')">Kwame</button>
    <button onclick="surprise()">Surprise</button>
  </div>

  <div class="footer">use headphones for binaural mode</div>

</div>

<script>
const sg=document.getElementById('sg'),nm=document.getElementById('nm'),meta=document.getElementById('meta');
const playBtn=document.getElementById('play'),pLabel=document.getElementById('pLabel'),pIcon=document.getElementById('pIcon');
const hpNote=document.getElementById('hpNote');
const VOW='AEIOUY';
const SCALE=[130.81,146.83,164.81,196.00,220.00,261.63,293.66,329.63,392.00,440.00];
const NOTES=['C3','D3','E3','G3','A3','C4','D4','E4','G4','A4'];

let ctx=null,nodes=[],playing=false,pulseTimer=null,mode='drone';

function setName(n){nm.value=n;gen();if(playing)restart();}
function surprise(){
  const names=['Lyra','Atlas','Indira','Theo','Esme','Rumi','Nadia','Cyrus','Amara','Felix','Selene','Orion'];
  nm.value=names[Math.floor(Math.random()*names.length)];gen();if(playing)restart();
}

function nameStats(){
  const raw=(nm.value||'A').toUpperCase().replace(/[^A-Z]/g,'')||'A';
  const vals=[...raw].map(c=>c.charCodeAt(0)-64);
  const sum=vals.reduce((a,b)=>a+b,0);
  const vow=[...raw].filter(c=>VOW.includes(c)).length;
  const rootIdx=sum%SCALE.length;
  const root=SCALE[rootIdx];
  const note=NOTES[rootIdx];
  const beatHz=4+(sum%5);
  return{raw,vals,sum,vow,rootIdx,root,note,beatHz};
}

function startDrone(st){
  const master=ctx.createGain();
  master.gain.setValueAtTime(0,ctx.currentTime);
  master.gain.linearRampToValueAtTime(0.7,ctx.currentTime+1.2);
  master.connect(ctx.destination);
  nodes=[{node:master,gain:master.gain}];
  const layers=[
    {f:st.root,g:0.18},
    {f:st.root*1.5,g:0.10},
    {f:st.root*2,g:0.06}
  ];
  [...st.raw].forEach(c=>{
    if(VOW.includes(c)){
      const v=c.charCodeAt(0)-64;
      layers.push({f:SCALE[v%SCALE.length]*2,g:0.04});
    }
  });
  layers.slice(0,7).forEach((t,i)=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine';
    o.frequency.value=t.f;
    o.detune.value=(i%2?1:-1)*(2+i*1.5);
    g.gain.value=t.g;
    o.connect(g);g.connect(master);
    const lfo=ctx.createOscillator(),lfoG=ctx.createGain();
    lfo.frequency.value=0.12+i*0.03;
    lfoG.gain.value=t.g*0.35;
    lfo.connect(lfoG);lfoG.connect(g.gain);
    o.start();lfo.start();
    nodes.push({node:o},{node:g},{node:lfo},{node:lfoG});
  });
}

function startBinaural(st){
  const merger=ctx.createChannelMerger(2);
  const master=ctx.createGain();
  master.gain.setValueAtTime(0,ctx.currentTime);
  master.gain.linearRampToValueAtTime(0.5,ctx.currentTime+1.5);
  merger.connect(master);
  master.connect(ctx.destination);
  nodes=[{node:master,gain:master.gain},{node:merger}];
  const oL=ctx.createOscillator(),gL=ctx.createGain();
  const oR=ctx.createOscillator(),gR=ctx.createGain();
  oL.type='sine';oR.type='sine';
  oL.frequency.value=st.root;
  oR.frequency.value=st.root+st.beatHz;
  gL.gain.value=0.5;gR.gain.value=0.5;
  oL.connect(gL);gL.connect(merger,0,0);
  oR.connect(gR);gR.connect(merger,0,1);
  oL.start();oR.start();
  nodes.push({node:oL},{node:oR},{node:gL},{node:gR});
}

function start(){
  if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();
  if(ctx.state==='suspended')ctx.resume();
  const st=nameStats();
  if(mode==='binaural')startBinaural(st);
  else startDrone(st);
  playing=true;
  pLabel.textContent='Stop';
  pIcon.innerHTML='<rect x="2" y="2" width="3" height="8" fill="currentColor"/><rect x="7" y="2" width="3" height="8" fill="currentColor"/>';
  startPulse();
}

function stop(){
  if(!ctx||!playing)return;
  playing=false;
  pLabel.textContent='Play';
  pIcon.innerHTML='<polygon points="2,1 11,6 2,11" fill="currentColor"/>';
  stopPulse();
  const t=ctx.currentTime;
  const old=nodes;
  nodes=[];
  if(old[0]&&old[0].gain){
    const g=old[0].gain;
    if(g.cancelAndHoldAtTime)g.cancelAndHoldAtTime(t);
    else g.cancelScheduledValues(t);
    g.linearRampToValueAtTime(0,t+0.6);
  }
  setTimeout(()=>{
    old.forEach(n=>{
      try{n.node.stop&&n.node.stop();}catch(e){}
      try{n.node.disconnect&&n.node.disconnect();}catch(e){}
    });
  },700);
}

function restart(){stop();setTimeout(start,750);}

function startPulse(){
  stopPulse();
  const seed=sg.querySelector('#seedDot');
  if(!seed)return;
  let t=0;
  const speed=mode==='binaural'?0.04:0.06;
  pulseTimer=setInterval(()=>{
    t+=speed;
    const s=1+Math.sin(t)*0.25;
    seed.setAttribute('r',6*s);
  },40);
}
function stopPulse(){
  if(pulseTimer){clearInterval(pulseTimer);pulseTimer=null;}
  const seed=sg.querySelector('#seedDot');
  if(seed)seed.setAttribute('r',6);
}

playBtn.addEventListener('click',()=>{playing?stop():start();});

document.querySelectorAll('button.mode').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('button.mode').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    mode=b.dataset.mode;
    hpNote.textContent=mode==='binaural'?'use headphones · stereo required':'';
    updateMeta();
    if(playing)restart();
  });
});

document.getElementById('dl').addEventListener('click',()=>{
  const st=nameStats();
  const svgEl=sg.cloneNode(true);
  // bake a dark background rect into the exported SVG
  const bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
  bg.setAttribute('x','0');bg.setAttribute('y','0');
  bg.setAttribute('width','600');bg.setAttribute('height','600');
  bg.setAttribute('fill','#0a0820');
  svgEl.insertBefore(bg,svgEl.firstChild);
  svgEl.setAttribute('xmlns','http://www.w3.org/2000/svg');
  const blob=new Blob([svgEl.outerHTML],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`soulsg-${st.raw.toLowerCase()}.svg`;
  a.click();
  URL.revokeObjectURL(url);
});

function updateMeta(){
  const st=nameStats();
  const n=Math.max(3,Math.min(st.vals.length,12));
  const layers=Math.max(2,Math.min(st.vow+2,6));
  const rootHz=Math.round(st.root);
  if(mode==='binaural'){
    meta.textContent=`${st.raw.toLowerCase()} · ${rootHz} Hz / ${rootHz+st.beatHz} Hz · ${st.beatHz} Hz beat (theta)`;
  }else{
    meta.textContent=`${st.raw.toLowerCase()} · ${n} points · ${layers} layers · ${rootHz} Hz ${st.note}`;
  }
}

function gen(){
  const st=nameStats();
  const{raw,vals,sum,vow}=st;
  const n=Math.max(3,Math.min(vals.length,12));
  const layers=Math.max(2,Math.min(vow+2,6));
  const hue=(sum*17)%360;
  const skip=Math.max(1,(sum%(Math.floor(n/2)))||2);
  const cx=300,cy=300;

  const cCore=`hsl(${hue} 95% 88%)`;
  const cPrim=`hsl(${hue} 85% 72%)`;
  const cAcc =`hsl(${(hue+45)%360} 80% 75%)`;
  const cDeep=`hsl(${(hue+200)%360} 70% 70%)`;

  updateMeta();

  let s=`<defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b1"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="halo">
      <stop offset="0%" stop-color="${cCore}" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="${cPrim}" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="${cPrim}" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="seed">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="${cCore}" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="${cPrim}" stop-opacity="0"/>
    </radialGradient>
  </defs>`;

  s+=`<circle cx="${cx}" cy="${cy}" r="280" fill="url(#halo)"/>`;
  for(let k=1;k<=layers;k++){
    const r=70+k*38;
    s+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${cPrim}" stroke-width="0.6" opacity="${0.18+k*0.06}" filter="url(#glow)"/>`;
  }
  const petalR=105;
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2-Math.PI/2;
    const px=cx+Math.cos(a)*petalR,py=cy+Math.sin(a)*petalR;
    s+=`<circle cx="${px}" cy="${py}" r="${petalR}" fill="none" stroke="${cAcc}" stroke-width="0.6" opacity="0.4" filter="url(#glow)"/>`;
  }
  const pts=vals.slice(0,n).map((v,i)=>{
    const a=(i/n)*Math.PI*2-Math.PI/2;
    const r=165+(v/26)*70;
    return[cx+Math.cos(a)*r,cy+Math.sin(a)*r];
  });
  for(let i=0;i<n;i++){
    const j=(i+skip)%n;
    s+=`<line x1="${pts[i][0]}" y1="${pts[i][1]}" x2="${pts[j][0]}" y2="${pts[j][1]}" stroke="${cPrim}" stroke-width="1.1" opacity="0.85" filter="url(#glow)"/>`;
  }
  const poly=pts.map(p=>p.join(',')).join(' ');
  s+=`<polygon points="${poly}" fill="none" stroke="${cCore}" stroke-width="0.8" opacity="0.7" filter="url(#glow)"/>`;
  for(let i=0;i<n;i++){
    s+=`<line x1="${cx}" y1="${cy}" x2="${pts[i][0]}" y2="${pts[i][1]}" stroke="${cDeep}" stroke-width="0.4" opacity="0.35"/>`;
  }
  vals.slice(0,n).forEach((v,i)=>{
    const isV=VOW.includes(raw[i]);
    const r=isV?7:4;
    s+=`<circle cx="${pts[i][0]}" cy="${pts[i][1]}" r="${r*2.2}" fill="${isV?cCore:cPrim}" opacity="0.25" filter="url(#softglow)"/>`;
    s+=`<circle cx="${pts[i][0]}" cy="${pts[i][1]}" r="${r}" fill="${isV?'#ffffff':cCore}" filter="url(#glow)"/>`;
  });
  s+=`<circle cx="${cx}" cy="${cy}" r="40" fill="url(#seed)"/>`;
  s+=`<circle id="seedDot" cx="${cx}" cy="${cy}" r="6" fill="#ffffff" filter="url(#glow)"/>`;
  s+=`<circle cx="${cx}" cy="${cy}" r="18" fill="none" stroke="${cCore}" stroke-width="0.6" opacity="0.8"/>`;
  for(let i=0;i<14;i++){
    const sx=((sum*(i+3)*131)%560)+20;
    const sy=((sum*(i+7)*97)%560)+20;
    const dx=sx-cx,dy=sy-cy;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<240||d>285)continue;
    s+=`<circle cx="${sx}" cy="${sy}" r="1" fill="${cCore}" opacity="0.7"/>`;
  }
  sg.innerHTML=`<title>Sigil for ${raw}</title><desc>Generated luminous mandala.</desc>`+s;
  if(playing)startPulse();
}
nm.addEventListener('input',gen);
gen();
</script>

</body>
</html>
